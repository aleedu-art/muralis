<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2318"/>
      <stop offset="50%" style="stop-color:#0d3d2b"/>
      <stop offset="100%" style="stop-color:#071a10"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#041a0e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d3d2b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c896;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff99;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="sun" cx="70%" cy="30%" r="20%">
      <stop offset="0%" style="stop-color:#00ff99;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#00c896;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00c896;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00c896;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00c896;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#glow2)"/>

  <!-- Sun/Moon glow -->
  <circle cx="280" cy="100" r="60" fill="url(#sun)"/>
  <circle cx="280" cy="100" r="28" fill="#00e888" opacity="0.15" filter="url(#blur2)"/>
  <circle cx="280" cy="100" r="18" fill="#00ff99" opacity="0.25"/>

  <!-- Distant skyline -->
  <g opacity="0.2" fill="#00c896">
    <rect x="10" y="220" width="18" height="80"/>
    <rect x="30" y="200" width="14" height="100"/>
    <rect x="46" y="215" width="22" height="85"/>
    <rect x="70" y="190" width="16" height="110"/>
    <rect x="88" y="210" width="12" height="90"/>
    <rect x="102" y="195" width="20" height="105"/>
    <rect x="124" y="220" width="14" height="80"/>
    <rect x="300" y="210" width="16" height="90"/>
    <rect x="318" y="195" width="22" height="105"/>
    <rect x="342" y="215" width="14" height="85"/>
    <rect x="358" y="200" width="18" height="100"/>
    <rect x="378" y="220" width="22" height="80"/>
  </g>

  <!-- Ground base -->
  <ellipse cx="200" cy="370" rx="220" ry="40" fill="#00c896" opacity="0.08"/>

  <!-- Large background leaf left -->
  <g opacity="0.18" fill="#00c896">
    <path d="M-20 350 Q40 200 120 280 Q60 320 -20 350Z"/>
    <path d="M380 380 Q340 220 280 300 Q330 340 380 380Z"/>
  </g>

  <!-- Tree trunk center -->
  <rect x="192" y="260" width="16" height="100" rx="4" fill="#00c896" opacity="0.5"/>
  <rect x="195" y="260" width="4" height="90" rx="2" fill="#00ff99" opacity="0.2"/>

  <!-- Tree branches -->
  <line x1="200" y1="290" x2="155" y2="250" stroke="#00c896" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="275" x2="245" y2="240" stroke="#00c896" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="305" x2="168" y2="275" stroke="#00c896" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="200" y1="300" x2="232" y2="272" stroke="#00c896" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Tree canopy clusters -->
  <circle cx="200" cy="220" r="55" fill="#00c896" opacity="0.25"/>
  <circle cx="200" cy="210" r="42" fill="#00c896" opacity="0.3"/>
  <circle cx="175" cy="235" r="32" fill="#00c896" opacity="0.28"/>
  <circle cx="225" cy="232" r="34" fill="#00c896" opacity="0.28"/>
  <circle cx="200" cy="195" r="30" fill="#00e888" opacity="0.22"/>
  <circle cx="185" cy="215" r="22" fill="#00ff99" opacity="0.12"/>
  <circle cx="215" cy="218" r="24" fill="#00ff99" opacity="0.12"/>
  <!-- Highlight on canopy -->
  <circle cx="210" cy="200" r="18" fill="#00ff99" opacity="0.08" filter="url(#blur1)"/>

  <!-- Foreground leaves / vines left -->
  <g opacity="0.7">
    <path d="M0 320 Q30 280 55 310 Q30 330 0 320Z" fill="#00c896" opacity="0.5"/>
    <path d="M0 350 Q50 310 70 340 Q40 365 0 350Z" fill="#00c896" opacity="0.4"/>
    <path d="M5 390 Q45 350 65 375 Q38 395 5 390Z" fill="#00c896" opacity="0.35"/>
    <!-- Vine line -->
    <path d="M20 400 Q25 360 40 330 Q55 300 50 270" stroke="#00c896" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Foreground leaves / vines right -->
  <g opacity="0.7">
    <path d="M400 300 Q370 265 345 295 Q370 315 400 300Z" fill="#00c896" opacity="0.5"/>
    <path d="M400 335 Q355 298 340 328 Q368 352 400 335Z" fill="#00c896" opacity="0.4"/>
    <path d="M400 370 Q358 338 342 362 Q368 382 400 370Z" fill="#00c896" opacity="0.35"/>
    <path d="M385 400 Q378 362 362 335 Q348 305 352 278" stroke="#00c896" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Small floating particles / fireflies -->
  <circle cx="80" cy="160" r="2" fill="#00ff99" opacity="0.7"/>
  <circle cx="130" cy="140" r="1.5" fill="#00ff99" opacity="0.5"/>
  <circle cx="310" cy="155" r="2" fill="#00ff99" opacity="0.6"/>
  <circle cx="340" cy="180" r="1.5" fill="#00ff99" opacity="0.45"/>
  <circle cx="160" cy="170" r="1" fill="#00ff99" opacity="0.6"/>
  <circle cx="255" cy="165" r="1.5" fill="#00ff99" opacity="0.5"/>
  <circle cx="115" cy="190" r="1" fill="#00ff99" opacity="0.4"/>
  <circle cx="290" cy="145" r="1" fill="#00ff99" opacity="0.55"/>

  <!-- Bottom gradient overlay -->
  <rect x="0" y="310" width="400" height="90" fill="url(#bg)" opacity="0.5"/>

  <!-- "MURALIS" text -->
  <text x="200" y="355" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="28" fill="#00c896" opacity="0.9" text-anchor="middle" letter-spacing="8">MURALIS</text>
  <text x="200" y="375" font-family="'Arial', sans-serif" font-size="10" fill="#00c896" opacity="0.55" text-anchor="middle" letter-spacing="3">APOIADOR NFT</text>

  <!-- Subtle border glow -->
  <rect x="1" y="1" width="398" height="398" rx="16" fill="none" stroke="#00c896" stroke-width="1.5" opacity="0.25"/>
  <rect x="4" y="4" width="392" height="392" rx="14" fill="none" stroke="#00c896" stroke-width="0.5" opacity="0.12"/>
</svg>
